{% extends "base.html" %}
{% block content%}
<div class="d-flex flex-column align-items-center">
    <a href="{{ url_for('main.add_note') }}" class="mx-auto btn btn-lg btn-primary">Add new Note</a>
    <br>
    <div class="d-flex flex-wrap justify-content-center">
        {% if notes %}
            {% for note in notes %}
                <div class="card d-flex flex-column mt-auto" style="width: 18rem; padding: 10px; margin: 10px;">
                    <img src="{{ url_for('static', filename='pics/'+ note.cover_pic) }}" class="card-img-top" style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title">{{ note.title }}</h5>
                        <p class="card-text">{{ note.content[:100] }}...</p>
                        <a href="{{ url_for('main.show_note', note_id=note.id) }}" class="btn btn-primary">view Note</a>
                    </div>
                    </div>
            {% endfor %}
        {% else %}
        <br><br>
        <h4 class="d-block">No notes yet. Click the button above to add your Notes!</h4>
        {% endif %}
    </div>
</div>
{% endblock %}
